name: CI
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
    - uses: swift-actions/setup-swift@v3
      with:
        swift-version: "6.2"
    - name: Build
      run: swift build
    - name: Run tests
      run: swift test --enable-code-coverage
    - name: Prepare coverage file
      run: xcrun llvm-cov export -format="lcov" .build/debug/swift-buildkite-pipelinePackageTests.xctest/Contents/MacOS/swift-buildkite-pipelinePackageTests -instr-profile .build/debug/codecov/default.profdata > info.lcov
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        fail_ci_if_error: true
        verbose: true
