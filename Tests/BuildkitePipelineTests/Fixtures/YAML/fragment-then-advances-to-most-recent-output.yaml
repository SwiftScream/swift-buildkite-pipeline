steps:
- label: Lint
  key: lint
  command: swift-format lint .
- label: Test
  key: test
  depends_on: lint
  command: swift test
- label: Upload Coverage
  depends_on: test
  command: bash .buildkite/upload-coverage.sh
- label: A
  key: a
  depends_on: test
  command: echo a
- label: B
  depends_on: a
  command: echo b
